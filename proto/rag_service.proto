syntax = "proto3";

package rag;

option go_package = "github.com/Morraban-Grid/docmind/services/go-user-service/internal/grpc_client/pb";

// IndexDocumentRequest message
message IndexDocumentRequest {
  string document_id = 1;
  string user_id = 2;
  string file_path = 3;
  string file_type = 4;
}

// IndexDocumentResponse message
message IndexDocumentResponse {
  bool success = 1;
  int32 chunk_count = 2;
  int32 embedding_count = 3;
  string error_message = 4;
}

// DeleteDocumentRequest message
message DeleteDocumentRequest {
  string document_id = 1;
}

// DeleteDocumentResponse message
message DeleteDocumentResponse {
  bool success = 1;
  int32 deleted_count = 2;
  string error_message = 3;
}

// QueryDocumentRequest message
message QueryDocumentRequest {
  string query = 1;
  string user_id = 2;
}

// QueryDocumentResponse message
message QueryDocumentResponse {
  string answer = 1;
  repeated string sources = 2;
  int32 chunk_count = 3;
  string error_message = 4;
}

// RAGService definition
service RAGService {
  rpc IndexDocument(IndexDocumentRequest) returns (IndexDocumentResponse);
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
  rpc QueryDocument(QueryDocumentRequest) returns (QueryDocumentResponse);
}
